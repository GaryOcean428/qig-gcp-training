# QIG-Native 100M Phase 0 — Identity Formation
# Machine: a2-highgpu-2g (2x A100 40GB) on Vertex AI
# Estimated cost: ~$7/hr x ~50hr = ~$350

model_size: "100m"
vocab_size: 32000
dropout: 0.1

data_dir: "/gcs/qig-training-data"
start_phase: "phase0_identity"
max_seq_len: 256

# NaturalGradientOptimizer (NOT Adam)
lr: 0.001
fisher_damping: 0.0001
fisher_update_freq: 100

batch_size: 64
grad_clip: 1.0
max_steps: 50000
warmup_steps: 500
log_every: 50
eval_every: 1000
save_every: 5000
phi_window: 100

output_dir: "/gcs/qig-training-data/checkpoints/100m_phase0"
tensorboard_dir: "/tmp/tb_100m_phase0"
seed: 42

# Vertex AI resource spec
vertex_machine_type: "a2-highgpu-2g"
vertex_accelerator_type: "NVIDIA_TESLA_A100"
vertex_accelerator_count: 2
vertex_region: "us-central1"
vertex_replica_count: 1
